<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lắc mở lì xì</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #ffecd2;
    font-family: Arial, sans-serif;
}

#shake-screen {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
}

#red-packet {
    width: 90vw;
    max-width: 420px;
    user-select: none;
    touch-action: none;
}

@keyframes shake {
    0%,100% { transform: translateX(-12px); }
    50% { transform: translateX(12px); }
}

#result {
    display: none;
    position: fixed;
    inset: 0;
    background: #ffecd2;
    text-align: center;
    padding-top: 30vh;
}

.amount {
    font-size: 26px;
    font-weight: bold;
    color: #d6336c;
}
</style>
</head>

<body>

<div id="shake-screen">
    <img id="red-packet" src="./baolixi.jpg" alt="Lì xì">
</div>

<div id="result">
    <p id="msg"></p>
    <p class="amount" id="money"></p>
</div>

<script>
/* ================= REDIRECT KHI RELOAD / MỞ TRỰC TIẾP ================= */
if (!sessionStorage.getItem("fromIndex")) {
    location.replace("index.html");
}
sessionStorage.removeItem("fromIndex");

// nếu reload bằng swipe/back cache (iOS)
window.addEventListener("pageshow", e => {
    if (e.persisted) location.replace("index.html");
});
/* ===================================================================== */

const name = sessionStorage.getItem("playerName") || "Bạn";

const amounts = ["20,000 VNĐ","50,000 VNĐ","100,000 VNĐ","150,000 VNĐ"];
const messages = [
    `Chúc ${name} năm mới phát tài!`,
    `Tiền vô ào ào nha ${name}!`,
    `Một năm rực rỡ đang chờ ${name}!`
];

const SHAKE_WINDOW = 2500; // 2.5s
const ARM_FORCE = 12;
const MIN_FORCE = 4;
const MAX_SHAKE_PX = 30;

let lastAcc = null;
let armed = false;
let startTime = null;
let finished = false;

const packet = document.getElementById("red-packet");

function initMotion() {
    if (typeof DeviceMotionEvent?.requestPermission === "function") {
        DeviceMotionEvent.requestPermission().then(p => {
            if (p === "granted") startListening();
        });
    } else {
        startListening();
    }
}

function startListening() {
    setTimeout(() => {
        window.addEventListener("devicemotion", onMotion, false);
    }, 1000); // bỏ rung nền ban đầu
}

initMotion();

function onMotion(e) {
    if (finished) return;

    const acc = e.accelerationIncludingGravity;
    if (!acc) return;

    if (!lastAcc) {
        lastAcc = { x: acc.x, y: acc.y, z: acc.z };
        return;
    }

    const dx = Math.abs(acc.x - lastAcc.x);
    const dy = Math.abs(acc.y - lastAcc.y);
    const dz = Math.abs(acc.z - lastAcc.z);
    lastAcc = { x: acc.x, y: acc.y, z: acc.z };

    const force = dx + dy + dz;
    if (force < MIN_FORCE) return;

    // chưa kích hoạt
    if (!armed) {
        if (force >= ARM_FORCE) {
            armed = true;
            startTime = Date.now();
        }
        return;
    }

    // rung theo lực
    const intensity = Math.min(MAX_SHAKE_PX, force * 1.5);
    packet.style.transform =
        `translate(${(Math.random() - 0.5) * intensity}px,
                   ${(Math.random() - 0.5) * intensity}px)`;

    if (Date.now() - startTime >= SHAKE_WINDOW) finish();
}

function finish() {
    finished = true;
    packet.style.transform = "";
    packet.style.animation = "shake 0.35s infinite";

    setTimeout(() => {
        document.getElementById("shake-screen").style.display = "none";
        document.getElementById("msg").innerText =
            messages[Math.floor(Math.random() * messages.length)];
        document.getElementById("money").innerText =
            "💰 " + amounts[Math.floor(Math.random() * amounts.length)];
        document.getElementById("result").style.display = "block";
    }, 700);
}
</script>

</body>
</html>
