<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lắc lì xì</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #ffecd2;
    overflow: hidden;
    font-family: Arial;
}

/* UNLOCK */
#unlock {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    color: #fff;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
}

/* SHAKE */
#shake-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#packet {
    width: 85vw;
    max-width: 420px;
}

#hint {
    margin-top: 20px;
    color: #d6336c;
}

#btn {
    margin-top: 15px;
    padding: 14px 30px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg,#ff5733,#d6336c);
    color: #fff;
}

/* RESULT */
#result {
    display: none;
    position: fixed;
    inset: 0;
    text-align: center;
    padding-top: 35vh;
}

.amount {
    font-size: 28px;
    font-weight: bold;
    color: #d6336c;
}

/* ANIMATION */
@keyframes shake {
    0% { transform: translate(-18px); }
    50% { transform: translate(18px); }
    100% { transform: translate(0); }
}
</style>
</head>

<body>

<div id="unlock">👆 Chạm màn hình để bắt đầu</div>

<div id="shake-screen">
    <img id="packet" src="./baolixi.jpg">
    <div id="hint">📱 Lắc điện thoại hoặc nhấn Lắc lì xì</div>
    <button id="btn">🧧 Lắc lì xì</button>
</div>

<div id="result">
    <p id="msg"></p>
    <p class="amount" id="money"></p>
</div>

<audio id="shakeSound" src="./shake.mp3" preload="auto"></audio>
<audio id="openSound" src="./open.mp3" preload="auto"></audio>

<script>
const name = sessionStorage.getItem("username");
if (!name) location.href = "index.html";

const messages = [
    `Chúc ${name} năm mới phát tài!`,
    `Lộc xuân đầy túi, ${name}!`
];
const amounts = ["20,000 VNĐ","50,000 VNĐ","100,000 VNĐ"];

let unlocked = false;
let shaking = false;
let finished = false;

const packet = document.getElementById("packet");
const shakeSound = document.getElementById("shakeSound");
const openSound = document.getElementById("openSound");

/* AUDIO UNLOCK */
function unlockAudio(audio) {
    audio.muted = true;
    audio.play().then(() => {
        audio.pause();
        audio.currentTime = 0;
        audio.muted = false;
    }).catch(()=>{});
}

/* UNLOCK SCREEN */
document.getElementById("unlock").addEventListener("touchstart", async () => {
    if (unlocked) return;
    unlocked = true;

    if (typeof DeviceMotionEvent?.requestPermission === "function") {
        const p = await DeviceMotionEvent.requestPermission();
        if (p !== "granted") return;
    }

    unlockAudio(shakeSound);
    unlockAudio(openSound);

    document.getElementById("unlock").style.display = "none";
});

/* START SHAKE */
function startShake() {
    if (!unlocked || shaking || finished) return;

    shaking = true;
    packet.style.animation = "shake 0.25s infinite";

    shakeSound.loop = true;
    shakeSound.currentTime = 0;
    shakeSound.play().catch(()=>{});

    setTimeout(openLixi, 2500);
}

/* OPEN */
function openLixi() {
    finished = true;
    shaking = false;

    packet.style.animation = "";
    shakeSound.pause();
    shakeSound.currentTime = 0;

    openSound.play().catch(()=>{});
    setTimeout(()=>openSound.pause(),1000);

    document.getElementById("shake-screen").style.display = "none";
    document.getElementById("msg").innerText =
        messages[Math.floor(Math.random()*messages.length)];
    document.getElementById("money").innerText =
        "💰 " + amounts[Math.floor(Math.random()*amounts.length)];
    document.getElementById("result").style.display = "block";
}

/* BUTTON */
document.getElementById("btn").onclick = startShake;

/* DEVICE SHAKE */
window.addEventListener("devicemotion", e => {
    if (!unlocked || shaking || finished) return;
    const a = e.accelerationIncludingGravity;
    if (!a) return;

    const force = Math.abs(a.x) + Math.abs(a.y) + Math.abs(a.z);
    if (force > 22) startShake();
});
</script>

</body>
</html>
