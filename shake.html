<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lắc lì xì</title>

<style>
html,body{
    margin:0;
    height:100%;
    background:#ffecd2;
    overflow:hidden;
    font-family:Arial;
}
#unlock{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    z-index:10;
    font-size:20px;
}
#screen{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}
#packet{
    width:85vw;
    max-width:420px;
}
#money{
    position:absolute;
    width:85vw;
    max-width:420px;
    opacity:0;
    transform:translateY(40px) scale(.6);
    pointer-events:none;
}
#btn{
    margin-top:20px;
    padding:14px 30px;
    font-size:18px;
    border-radius:30px;
    border:none;
    background:linear-gradient(45deg,#ff5733,#d6336c);
    color:#fff;
}
#result{
    display:none;
    position:fixed;
    inset:0;
    text-align:center;
    padding-top:35vh;
}
.amount{
    font-size:30px;
    font-weight:bold;
    color:#d6336c;
}
@keyframes shake{
    0%{transform:translateX(-18px)}
    50%{transform:translateX(18px)}
    100%{transform:translateX(0)}
}
@keyframes moneyOut{
    to{opacity:1;transform:translateY(-160px) scale(1.15)}
}
.money-out{animation:moneyOut .8s ease-out forwards}
</style>
</head>

<body>

<div id="unlock">
👆 Chạm màn hình để bắt đầu<br>
📱 Lắc điện thoại hoặc nhấn “Lắc lì xì”
</div>

<div id="screen">
    <img id="packet" src="./baolixi.jpg">
    <img id="money" src="./money.gif">
    <button id="btn">🧧 Lắc lì xì</button>
</div>

<div id="result">
    <p id="msg"></p>
    <p class="amount" id="amount"></p>
</div>

<audio id="bgm" src="./bgm.mp3" loop></audio>
<audio id="shakeSound" src="./shake.mp3"></audio>
<audio id="openSound" src="./open.mp3"></audio>

<script>
/* ===== GUARD ===== */
(()=>{
    if(!sessionStorage.getItem("username")){
        location.replace("index.html");
    }
})();

/* ===== DATA ===== */
const name=sessionStorage.getItem("username");
const type=sessionStorage.getItem("userType");

const messages={
    kid:[`Chúc ${name} hay ăn chóng lớn 🎈`,`Chúc ${name} luôn vui vẻ 🧸`],
    youth:[`Tiền vô như nước 💰`,`Năm mới bùng nổ 🔥`],
    adult:[`An khang thịnh vượng 🧧`,`Gia đình bình an 🍀`]
};
const amounts=["20,000 VNĐ","50,000 VNĐ","100,000 VNĐ"];

/* ===== STATE ===== */
let unlocked=false,shaking=false,finished=false;
let stopTimer=null;
let maxShakeForce=0;

/* ===== ELEMENT ===== */
/* const packet=packetEl=packet=document.getElementById("packet");*/
const money=document.getElementById("money");
const bgm=document.getElementById("bgm");
const shakeSound=document.getElementById("shakeSound");
const openSound=document.getElementById("openSound");

/* ===== UNLOCK iOS SAFE ===== */
async function unlockApp(){
    if(unlocked) return;
    unlocked=true;

    if(typeof DeviceMotionEvent==="function"
    && typeof DeviceMotionEvent.requestPermission==="function"){
        try{
            const p=await DeviceMotionEvent.requestPermission();
            if(p!=="granted"){unlocked=false;return;}
        }catch{unlocked=false;return;}
    }

    [bgm,shakeSound,openSound].forEach(a=>{
        a.muted=true;
        a.play().then(()=>{
            a.pause();a.currentTime=0;a.muted=false;
        }).catch(()=>{});
    });

    bgm.volume=.4;
    bgm.play().catch(()=>{});
    unlock.style.display="none";

    document.body.removeEventListener("click",unlockApp);
    document.body.removeEventListener("touchend",unlockApp);
    document.body.removeEventListener("pointerup",unlockApp);
}
document.body.addEventListener("click",unlockApp,{passive:true});
document.body.addEventListener("touchend",unlockApp,{passive:true});
document.body.addEventListener("pointerup",unlockApp,{passive:true});

/* ===== SHAKE ===== */
function startShake(){
    if(shaking||finished) return;
    shaking=true;
    packet.style.animation="shake .25s infinite";
    shakeSound.loop=true;
    shakeSound.play().catch(()=>{});
    navigator.vibrate?.([80,40,80]);
}
function stopShake(){
    packet.style.animation="";
    shakeSound.pause();
    shakeSound.currentTime=0;
    shaking=false;
}

/* ===== OPEN ===== */
function openLixi(){
    if(finished) return;
    finished=true;
    stopShake();
	
	// hide img lixi
	document.getElementById("packet").style.display = "none";
	
	//hide btn
	document.getElementById("btn").style.display = "none";

    // volume theo lực lắc
    let volume=Math.min(1,0.4+maxShakeForce/30);
    openSound.volume=volume;
    maxShakeForce=0;

    openSound.currentTime=0;
    openSound.play().catch(()=>{});

    // fade out 2.5s
    let dur=2500,step=50;
    let dec=openSound.volume/(dur/step);
    let fade=setInterval(()=>{
        if(openSound.volume>dec){
            openSound.volume-=dec;
        }else{
            openSound.pause();
            openSound.currentTime=0;
            clearInterval(fade);
        }
    },step);

    navigator.vibrate?.([120,60,120]);
    money.classList.add("money-out");

    setTimeout(()=>{
        screen.style.display="none";
        msg.innerText=messages[type][Math.floor(Math.random()*messages[type].length)];
        amount.innerText="💰 "+amounts[Math.floor(Math.random()*amounts.length)];
        result.style.display="block";
        sessionStorage.clear();
    },800);
}

/* ===== BUTTON ===== */
btn.onclick=()=>{
    if(!unlocked||finished) return;
    startShake();
    setTimeout(openLixi,3500);
};

/* ===== DEVICE MOTION (X/Y only) ===== */
window.addEventListener("devicemotion",e=>{
    if(!unlocked||finished) return;
    const a=e.accelerationIncludingGravity;
    if(!a) return;

    const force=Math.abs(a.x)+Math.abs(a.y);
    if(force>12){
        startShake();
        if(force>maxShakeForce) maxShakeForce=force;
        clearTimeout(stopTimer);
        stopTimer=setTimeout(openLixi,600);
    }
});
</script>

</body>
</html>
