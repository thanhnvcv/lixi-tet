<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lắc mở lì xì</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #ffecd2;
    text-align: center;
    padding: 20px;
}
#red-packet {
    width: 160px;
    margin: 40px auto;
}
@keyframes shake {
    0%,100% { transform: translateX(-6px); }
    50% { transform: translateX(6px); }
}
#result {
    display: none;
    margin-top: 20px;
}
.amount {
    font-size: 22px;
    color: #d6336c;
    font-weight: bold;
}
</style>
</head>
<body>

<h2>📱 Lắc điện thoại để mở lì xì</h2>

<img id="red-packet" src="./baolixi.jpg">

<div id="result">
    <p id="msg"></p>
    <p class="amount" id="money"></p>
</div>

<script>

const name = sessionStorage.getItem("playerName") || "Bạn";

const amounts = ["20,000 VNĐ","50,000 VNĐ","100,000 VNĐ","150,000 VNĐ"];
const messages = [
    `Chúc ${name} năm mới phát tài!`,
    `Tiền vô ào ào nha ${name}!`,
    `Một năm rực rỡ đang chờ ${name}!`
];

let lastAcc = { x: 0, y: 0, z: 0 };
let startTime = null;
let totalEnergy = 0;
let finished = false;

const SHAKE_WINDOW = 3500;   // 3.5s
const ENERGY_THRESHOLD = 140;
const MIN_DELTA = 3;

function requestMotion() {
    if (typeof DeviceMotionEvent?.requestPermission === "function") {
        DeviceMotionEvent.requestPermission().then(p => {
            if (p === "granted") startShake();
        });
    } else {
        startShake();
    }
}

function startShake() {
    window.addEventListener("devicemotion", handleShake, false);
}

requestMotion();

function handleShake(e) {
    if (finished) return;

    const acc = e.accelerationIncludingGravity;
    if (!acc) return;

    const dx = Math.abs(acc.x - lastAcc.x);
    const dy = Math.abs(acc.y - lastAcc.y);
    const dz = Math.abs(acc.z - lastAcc.z);
    lastAcc = { x: acc.x, y: acc.y, z: acc.z };

    const force = dx + dy + dz;
    if (force < MIN_DELTA) return;

    if (!startTime) {
        startTime = Date.now();
        totalEnergy = 0;
    }

    totalEnergy += force;

    // 🔥 map lực → độ rung (px)
    const intensity = Math.min(20, force * 1.2);
    document.getElementById("red-packet").style.transform =
        `translateX(${(Math.random() > 0.5 ? 1 : -1) * intensity}px)`;

    if (Date.now() - startTime >= SHAKE_WINDOW) finish();
}

function finish() {
    finished = true;
    document.getElementById("red-packet").style.transform = "";
    document.getElementById("red-packet").style.animation = "shake 0.4s infinite";

    setTimeout(() => {
        document.getElementById("red-packet").style.display = "none";
        document.getElementById("msg").innerText =
            messages[Math.floor(Math.random() * messages.length)];
        document.getElementById("money").innerText =
            "💰 " + amounts[Math.floor(Math.random() * amounts.length)];
        document.getElementById("result").style.display = "block";
    }, 800);
}

</script>

</body>
</html>
