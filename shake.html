<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lắc lì xì</title>

<style>
html,body{
    margin:0;height:100%;overflow:hidden;
    background:#ffecd2;font-family:Arial;
}
#unlock{
    position:fixed;inset:0;z-index:10;
    background:rgba(0,0,0,.85);color:#fff;
    display:flex;align-items:center;justify-content:center;
    text-align:center;font-size:20px;
}
#shake-screen{
    position:fixed;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
}
#packet{width:80vw;max-width:400px;}
#money{
    position:absolute;width:120px;
    opacity:0;transform:translateY(40px) scale(.6);
}
#btn{
    margin-top:20px;
    padding:14px 30px;font-size:18px;
    border-radius:30px;border:none;
    background:linear-gradient(45deg,#ff5733,#d6336c);
    color:#fff;
}
#result{
    display:none;position:fixed;inset:0;
    text-align:center;padding-top:35vh;
}
.amount{font-size:28px;font-weight:bold;color:#d6336c;}

@keyframes shake{
    0%{transform:translateX(-18px)}
    50%{transform:translateX(18px)}
    100%{transform:translateX(0)}
}
@keyframes moneyOut{
    to{opacity:1;transform:translateY(-150px) scale(1.1)}
}
.money-out{animation:moneyOut .8s forwards}
</style>
</head>

<body>

<div id="unlock">
👆 Chạm màn hình để bắt đầu<br>
📱 Sau đó lắc điện thoại
</div>

<div id="shake-screen">
<img id="packet" src="./baolixi.jpg">
/*<img id="money" src="./money.png">*/
<button id="btn">🧧 Lắc lì xì</button>
</div>

<div id="result">
<p id="msg"></p>
<p class="amount" id="amount"></p>
</div>

<audio id="bgm" src="./shake.mp3" loop></audio>
<audio id="shakeSound" src="./shake.mp3"></audio>
<audio id="openSound" src="./open.mp3"></audio>

<script>
/* ===== GUARD ===== */
(function(){
    if(!sessionStorage.getItem("fromIndex")){
        sessionStorage.clear();
        location.replace("index.html");
    }
    sessionStorage.removeItem("fromIndex");
})();

const name = sessionStorage.getItem("username");
const type = sessionStorage.getItem("userType");
if(!name||!type) location.replace("index.html");

/* ===== DATA ===== */
const messages={
    kid:[`Chúc ${name} hay ăn chóng lớn 🎈`,`Chúc ${name} luôn vui vẻ 🧸`],
    youth:[`Chúc ${name} bùng nổ năng lượng 🔥`,`Tiền vô như nước 💰`],
    adult:[`Chúc ${name} an khang thịnh vượng 🧧`,`Sức khỏe – tài lộc đầy nhà 🍀`]
};
const amounts=["20,000","50,000","100,000"];

/* ===== STATE ===== */
let unlocked=false,shaking=false,finished=false;
let stopTimer=null;

/* ===== ELEMENT ===== */
const packet=document.getElementById("packet");
const money=document.getElementById("money");
const bgm=document.getElementById("bgm");
const shakeSound=document.getElementById("shakeSound");
const openSound=document.getElementById("openSound");

/* ===== UNLOCK (FIX iOS) ===== */
async function unlock(e){
    if(unlocked) return;
    unlocked=true;
    e.preventDefault();

    if(typeof DeviceMotionEvent?.requestPermission==="function"){
        const p=await DeviceMotionEvent.requestPermission();
        if(p!=="granted"){unlocked=false;return;}
    }

    [bgm,shakeSound,openSound].forEach(a=>{
        a.muted=true;a.play().then(()=>{
            a.pause();a.currentTime=0;a.muted=false;
        }).catch(()=>{});
    });

    bgm.volume=.4;bgm.play().catch(()=>{});
    document.getElementById("unlock").style.display="none";
}

["click","touchstart","pointerdown"].forEach(ev=>{
    unlockEl=document.getElementById("unlock");
    unlockEl.addEventListener(ev,unlock,{passive:false});
});

/* ===== SHAKE ===== */
function startShake(){
    if(shaking||finished) return;
    shaking=true;
    packet.style.animation="shake .25s infinite";
    shakeSound.loop=true;
    shakeSound.play().catch(()=>{});
    navigator.vibrate?.([80,40,80]);
}
function stopShake(){
    packet.style.animation="";
    shakeSound.pause();shakeSound.currentTime=0;
    shaking=false;
}

/* ===== OPEN ===== */
function openLixi(){
    if(finished) return;
    finished=true;
    stopShake();
    navigator.vibrate?.([120,60,120]);
    openSound.play().catch(()=>{});
    money.classList.add("money-out");

    const data=JSON.parse(localStorage.getItem("lixi_played_names")||"{}");
    data[name.toLowerCase()]=true;
    localStorage.setItem("lixi_played_names",JSON.stringify(data));

    setTimeout(()=>{
        document.getElementById("shake-screen").style.display="none";
        msg.innerText=messages[type][Math.floor(Math.random()*messages[type].length)];
        amount.innerText="💰 "+amounts[Math.floor(Math.random()*amounts.length)];
        result.style.display="block";
        sessionStorage.clear();
    },800);
}

/* ===== BUTTON ===== */
btn.onclick=()=>{
    if(!unlocked||finished) return;
    startShake();
    setTimeout(openLixi,3500);
};

/* ===== DEVICE MOTION (X/Y) ===== */
window.addEventListener("devicemotion",e=>{
    if(!unlocked||finished) return;
    const a=e.accelerationIncludingGravity;
    if(!a) return;
    const force=Math.abs(a.x)+Math.abs(a.y);
    if(force>16){
        startShake();
        clearTimeout(stopTimer);
        stopTimer=setTimeout(openLixi,600);
    }
});
</script>

</body>
</html>
