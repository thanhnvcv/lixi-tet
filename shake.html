<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lắc mở lì xì</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #ffecd2;
    font-family: Arial, sans-serif;
}

/* ===== MÀN LẮC ===== */
#shake-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#red-packet {
    width: 90vw;
    max-width: 420px;
    user-select: none;
    touch-action: none;
}

/* ===== HƯỚNG DẪN ===== */
#shake-hint {
    margin-top: 20px;
    font-size: 16px;
    color: #d6336c;
    text-align: center;
}

/* ===== BUTTON ===== */
#start-wrap {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.5);
    z-index: 999;
}

#start-shake {
    padding: 16px 30px;
    font-size: 20px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg,#ff5733,#d6336c);
    color: #fff;
}

/* ===== KẾT QUẢ ===== */
#result {
    display: none;
    position: fixed;
    inset: 0;
    background: #ffecd2;
    text-align: center;
    padding-top: 30vh;
}

.amount {
    font-size: 26px;
    font-weight: bold;
    color: #d6336c;
}
</style>
</head>

<body>

<!-- BUTTON XIN QUYỀN -->
<div id="start-wrap">
    <button id="start-shake">🧧 Lắc lì xì</button>
</div>

<!-- MÀN LẮC -->
<div id="shake-screen">
    <img id="red-packet" src="./baolixi.jpg" alt="Lì xì">
    <div id="shake-hint">📱 Lắc điện thoại hoặc nhấn <b>Lắc lì xì</b></div>
</div>

<!-- KẾT QUẢ -->
<div id="result">
    <p id="msg"></p>
    <p class="amount" id="money"></p>
</div>

<!-- ÂM THANH -->
<audio id="shake-sound" preload="auto" src="./shake.mp3"></audio>
<audio id="open-sound" preload="auto" src="./open.mp3"></audio>

<script>
/* ===== QUAY VỀ MÀN NHẬP TÊN KHI RELOAD ===== */
window.addEventListener("pageshow", e => {
    if (e.persisted) location.replace("index.html");
});

/* ===== DATA ===== */
const name = sessionStorage.getItem("playerName") || "Bạn";
const amounts = ["20,000 VNĐ","50,000 VNĐ","100,000 VNĐ","150,000 VNĐ"];
const messages = [
    `Chúc ${name} năm mới phát tài!`,
    `Tiền vô ào ào nha ${name}!`,
    `Một năm rực rỡ đang chờ ${name}!`
];

/* ===== CONFIG ===== */
const SHAKE_TIME = 2500; // 2–3s
const ARM_FORCE = 12;
const MIN_FORCE = 4;
const MAX_SHAKE_PX = 30;

/* ===== STATE ===== */
let lastAcc = null;
let armed = false;
let startTime = 0;
let finished = false;
let canPlaySound = false;

/* ===== ELEMENT ===== */
const packet = document.getElementById("red-packet");
const startBtn = document.getElementById("start-shake");
const startWrap = document.getElementById("start-wrap");
const hint = document.getElementById("shake-hint");
const shakeSound = document.getElementById("shake-sound");
const openSound = document.getElementById("open-sound");

/* ===== BUTTON CLICK ===== */
startBtn.addEventListener("click", async () => {
    startWrap.style.display = "none";
    hint.style.display = "none";

    // xin quyền iOS
    if (typeof DeviceMotionEvent?.requestPermission === "function") {
        const permission = await DeviceMotionEvent.requestPermission();
        if (permission !== "granted") {
            alert("Vui lòng cho phép quyền chuyển động để lắc lì xì");
            location.reload();
            return;
        }
    }

    // unlock audio iOS
    shakeSound.play().then(() => {
        shakeSound.pause();
        shakeSound.currentTime = 0;
        canPlaySound = true;
    }).catch(()=>{});

    setTimeout(() => {
        window.addEventListener("devicemotion", onMotion, false);
    }, 500);
});

/* ===== HANDLE SHAKE ===== */
function onMotion(e) {
    if (finished) return;

    const acc = e.accelerationIncludingGravity;
    if (!acc) return;

    if (!lastAcc) {
        lastAcc = { x: acc.x, y: acc.y, z: acc.z };
        return;
    }

    const dx = Math.abs(acc.x - lastAcc.x);
    const dy = Math.abs(acc.y - lastAcc.y);
    const dz = Math.abs(acc.z - lastAcc.z);
    lastAcc = { x: acc.x, y: acc.y, z: acc.z };

    const force = dx + dy + dz;
    if (force < MIN_FORCE) return;

    if (!armed) {
        if (force >= ARM_FORCE) {
            armed = true;
            startTime = Date.now();
        }
        return;
    }

    // rung + âm thanh khi lắc mạnh
    if (navigator.vibrate && force > 8) navigator.vibrate(30);
    if (canPlaySound && force > 8) {
        shakeSound.volume = Math.min(1, force / 20);
        shakeSound.currentTime = 0;
        shakeSound.play().catch(()=>{});
    }

    const intensity = Math.min(MAX_SHAKE_PX, force * 1.5);
    packet.style.transform =
        `translate(${(Math.random()-0.5)*intensity}px,
                   ${(Math.random()-0.5)*intensity}px)`;

    if (Date.now() - startTime >= SHAKE_TIME) finish();
}

/* ===== FINISH ===== */
function finish() {
    finished = true;
    packet.style.transform = "";

    if (navigator.vibrate) navigator.vibrate([100,50,100]);
    if (canPlaySound) openSound.play().catch(()=>{});

    setTimeout(() => {
        document.getElementById("shake-screen").style.display = "none";
        document.getElementById("msg").innerText =
            messages[Math.floor(Math.random() * messages.length)];
        document.getElementById("money").innerText =
            "💰 " + amounts[Math.floor(Math.random() * amounts.length)];
        document.getElementById("result").style.display = "block";
    }, 400);
}
</script>

</body>
</html>
