<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lắc lì xì</title>

<style>
body {
    font-family: Arial;
    background: #ffecd2;
    text-align: center;
    padding-top: 20vh;
}
input {
    padding: 12px;
    width: 240px;
    font-size: 16px;
    border-radius: 20px;
    border: 2px solid #d6336c;
    text-align: center;
}
button {
    margin: 10px;
    padding: 12px 22px;
    font-size: 16px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(45deg,#ff5733,#d6336c);
    color: white;
}
</style>
</head>

<body>

<h2>🎉 Nhập tên của bạn</h2>
<input id="name" placeholder="Tên của bạn">

<h3>Bạn thuộc nhóm nào?</h3>

<button onclick="start('kid')">🧒 Trẻ em</button>
<button onclick="start('youth')">🧑 Bạn trẻ</button>
<button onclick="start('adult')">👨‍👩‍👧 Người lớn</button>

<script>
function hasPlayed(name) {
    const data = JSON.parse(localStorage.getItem("lixi_played_names") || "{}");
    return !!data[name.toLowerCase()];
}

function start(type) {
    const name = document.getElementById("name").value.trim();
    if (!name) return alert("Vui lòng nhập tên!");

    if (hasPlayed(name)) {
        alert("⚠️ Tên này đã nhận lì xì rồi 🧧");
        return;
    }

    sessionStorage.clear();
    sessionStorage.setItem("username", name);
    sessionStorage.setItem("userType", type);
    sessionStorage.setItem("fromIndex", "1");

    location.href = "shake.html";
}
</script>

</body>
</html>
