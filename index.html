<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhập tên</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffecd2;
    font-family: Arial;
}
.box {
    text-align: center;
}
input {
    padding: 14px;
    font-size: 18px;
    border-radius: 25px;
    border: 2px solid #d6336c;
    text-align: center;
}
button {
    margin-top: 15px;
    padding: 14px 30px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg,#ff5733,#d6336c);
    color: #fff;
}
</style>
</head>
<body>

<div class="box">
    <input id="username" placeholder="Nhập tên của bạn">
    <br>
    <button onclick="go()">Bắt đầu</button>
</div>

<script>
function go() {
    const name = document.getElementById("username").value.trim();
    if (!name) {
        alert("Vui lòng nhập tên");
        return;
    }
    sessionStorage.setItem("username", name);
    location.href = "shake.html";
}
</script>

</body>
</html>
