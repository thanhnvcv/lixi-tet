<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhập tên nhận lì xì</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #ffecd2;
    text-align: center;
    padding: 40px;
}
input {
    padding: 12px;
    font-size: 16px;
    width: 240px;
    border-radius: 20px;
    border: 2px solid #d6336c;
    text-align: center;
}
button {
    margin-top: 15px;
    padding: 12px 20px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(45deg,#ff5733,#d6336c);
    color: white;
    font-size: 16px;
}
</style>
</head>
<body>

<h2>🎉 Nhập tên để nhận lì xì</h2>

<input id="user-name" placeholder="Tên của bạn">
<br>
<button onclick="start()">Bắt đầu</button>

<script>
function start() {
    const name = document.getElementById("user-name").value.trim();
    if (!name) {
        alert("Vui lòng nhập tên!");
        return;
    }

    // Lưu tên để trang sau dùng
    sessionStorage.setItem("playerName", name);

    // CHUYỂN SANG DOCUMENT KHÁC → iOS reset undo stack
    location.href = "shake.html";
}
</script>

</body>
</html>
