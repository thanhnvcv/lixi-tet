<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhập tên nhận lì xì</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #ffecd2;
    font-family: Arial, sans-serif;
}
body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
input {
    padding: 14px;
    font-size: 16px;
    width: 260px;
    border-radius: 25px;
    border: 2px solid #d6336c;
    text-align: center;
}
button {
    margin-top: 16px;
    padding: 12px 24px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(45deg,#ff5733,#d6336c);
    color: white;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>🧧 Nhập tên để nhận lì xì</h2>
<input id="user-name" placeholder="Tên của bạn">
<button onclick="start()">Bắt đầu</button>

<script>
function start() {
    const name = document.getElementById("user-name").value.trim();
    if (!name) {
        alert("Vui lòng nhập tên!");
        return;
    }

    // reset toàn bộ state cũ
    sessionStorage.clear();

    sessionStorage.setItem("playerName", name);
    sessionStorage.setItem("fromIndex", "1"); // FLAG hợp lệ

    location.href = "shake.html";
}
</script>

</body>
</html>
